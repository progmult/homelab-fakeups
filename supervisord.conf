[supervisord]
nodaemon=true

[program:driver]
command=/lib/nut/dummy-ups -a fakeups -u nut -F
priority=10
startsecs=3
autorestart=true
stdout_logfile=/var/log/nut/driver.log
stderr_logfile=/var/log/nut/driver.err.log

[program:driver_qnapups]
command=/lib/nut/dummy-ups -a qnapups -u nut -F
priority=10
startsecs=3
autorestart=true
stdout_logfile=/var/log/nut/driver_qnapups.log
stderr_logfile=/var/log/nut/driver_qnapups.err.log

[program:upsd]
command=/sbin/upsd -F -u nut
priority=20
startsecs=3
autorestart=true
stdout_logfile=/var/log/nut/upsd.log
stderr_logfile=/var/log/nut/upsd.err.log

[program:upsmon]
command=/sbin/upsmon -F
priority=30
startsecs=3
autorestart=true
stdout_logfile=/var/log/nut/upsmon.log
stderr_logfile=/var/log/nut/upsmon.err.log

[program:powerwatch]
command=python3 /usr/local/bin/powerwatch.py
priority=40
startsecs=2
autorestart=true
stdout_logfile=/var/log/nut/powerwatch.log
stderr_logfile=/var/log/nut/powerwatch.err.log

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock
